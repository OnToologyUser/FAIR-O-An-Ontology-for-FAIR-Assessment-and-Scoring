name: Build WIDOCO documentation

on:
  push:
    branches:
      - main
    paths:
      - "FAIR-O.ttl"
      - "widoco-sections/**"
      - ".github/workflows/build-widoco-docs.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare temporary workspace
        run: |
          sudo rm -rf /tmp/widoco-input /tmp/widoco-output
          mkdir -p /tmp/widoco-input
          mkdir -p /tmp/widoco-output
          mkdir -p /tmp/widoco-output/resources
          mkdir -p /tmp/widoco-output/webvowl
          cp FAIR-O.ttl /tmp/widoco-input/FAIR-O.ttl
          chmod -R 777 /tmp/widoco-output

      - name: Generate WIDOCO documentation with OOPS
        run: |
          docker run --rm \
            -v /tmp/widoco-input:/input \
            -v /tmp/widoco-output:/output \
            ghcr.io/dgarijo/widoco:latest \
            -ontFile /input/FAIR-O.ttl \
            -outFolder /output \
            -webVowl \
            -rewriteAll \
            -getOntologyMetadata \
            -oops

      - name: Replace docs folder
        run: |
          sudo rm -rf docs
          mkdir -p docs
          cp -R /tmp/widoco-output/. docs/

          if [ -f docs/index-en.html ]; then
            cp docs/index-en.html docs/index.html
          fi

      - name: Replace WIDOCO placeholder sections
        run: |
          mkdir -p docs/sections

          if [ -f widoco-sections/abstract-en.html ]; then
            cp widoco-sections/abstract-en.html docs/sections/abstract-en.html
          fi

          if [ -f widoco-sections/introduction-en.html ]; then
            cp widoco-sections/introduction-en.html docs/sections/introduction-en.html
          fi

          if [ -f widoco-sections/description-en.html ]; then
            cp widoco-sections/description-en.html docs/sections/description-en.html
          fi

      - name: Commit generated documentation
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update WIDOCO documentation"
          file_pattern: "docs/**"